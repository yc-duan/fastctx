name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: fastctx.exe
            archive: fastctx-x86_64-pc-windows-msvc.zip
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.31
            binary: fastctx
            archive: fastctx-x86_64-unknown-linux-gnu.tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: fastctx
            archive: fastctx-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary: fastctx
            archive: fastctx-aarch64-apple-darwin.tar.gz

    steps:
      - name: Prepare Git Bash temporary directories
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $git = (Get-Command git.exe -ErrorAction Stop).Source
          $cursor = Split-Path $git -Parent
          $gitRoot = $null
          while ($cursor) {
            if (Test-Path (Join-Path $cursor "usr/bin/bash.exe")) {
              $gitRoot = $cursor
              break
            }
            $parent = Split-Path $cursor -Parent
            if (-not $parent -or $parent -eq $cursor) { break }
            $cursor = $parent
          }
          if (-not $gitRoot) { throw "Cannot locate the Git for Windows root from $git" }
          $tempPaths = @(
            (Join-Path $gitRoot "tmp")
            $env:TEMP
            $env:TMP
            [System.IO.Path]::GetTempPath()
            (Join-Path $env:USERPROFILE "AppData/Local/Temp")
          ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) } | Sort-Object -Unique
          foreach ($path in $tempPaths) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
          }
          $bash = Join-Path $gitRoot "usr/bin/bash.exe"
          & $bash --noprofile --norc -c "mkdir -p /tmp && test -d /tmp"
          if ($LASTEXITCODE -ne 0) {
            throw "Git Bash could not create and resolve its POSIX /tmp directory"
          }

      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install pinned Zig
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: 0.14.1
      - name: Install pinned cargo-zigbuild
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo install cargo-zigbuild --locked --version 0.23.0
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Test release contracts
        run: cargo test --locked --release --target ${{ matrix.target }}

      - name: Build single-file executable
        if: matrix.target != 'x86_64-unknown-linux-gnu'
        env:
          FASTCTX_DISTRIBUTION: github-release
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Build glibc 2.31 Linux executable
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          FASTCTX_DISTRIBUTION: github-release
        run: cargo zigbuild --locked --release --target ${{ matrix.zig_target }}

      - name: Enforce Linux GLIBC symbol floors
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail

          highest_glibc() {
            local file="$1"
            LANG=C readelf -W --version-info --dyn-syms "$file" |
              sed -nE 's/.*Name: GLIBC_([0-9]+(\.[0-9]+)+).*/\1/p' |
              sort -Vu |
              tail -n 1
          }

          version_at_most() {
            local actual="$1"
            local maximum="$2"
            [[ "$(printf '%s\n%s\n' "$actual" "$maximum" | sort -V | tail -n 1)" == "$maximum" ]]
          }

          assert_glibc_at_most() {
            local file="$1"
            local maximum="$2"
            local label="$3"
            local actual
            actual="$(highest_glibc "$file")"
            if [[ -z "$actual" ]]; then
              echo "::error::$label exposes no GLIBC version requirements"
              return 1
            fi
            if ! version_at_most "$actual" "$maximum"; then
              echo "::error::$label requires GLIBC_$actual, above GLIBC_$maximum"
              return 1
            fi
            echo "$label: highest required symbol is GLIBC_$actual (maximum GLIBC_$maximum)"
          }

          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          assert_glibc_at_most "$binary" "2.31" "FastCtx Linux executable"

          if assert_glibc_at_most "$binary" "2.17" "negative-control executable"; then
            echo "::error::The GLIBC gate negative control unexpectedly accepted a 2.17 floor"
            exit 1
          fi
          echo "Negative control correctly rejected the executable at a GLIBC_2.17 floor"

          mapfile -t pdfium_libraries < <(
            find "target/${{ matrix.target }}/release/build" \
              -type f \
              -path '*/out/bundled-pdfium/libpdfium.so' \
              -print
          )
          if [[ "${#pdfium_libraries[@]}" -eq 0 ]]; then
            echo "::error::The embedded libpdfium.so build input was not found"
            exit 1
          fi
          for pdfium in "${pdfium_libraries[@]}"; do
            assert_glibc_at_most "$pdfium" "2.16" "Embedded Pdfium"
          done

      - name: Stage release archive
        shell: pwsh
        run: |
          ./scripts/stage-release-archive.ps1 `
            -Target "${{ matrix.target }}" `
            -Binary "target/${{ matrix.target }}/release/${{ matrix.binary }}"

      - name: Smoke-test Linux on glibc 2.31 and 2.35
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          cat > target/glibc-smoke.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          binary=/opt/fastctx
          version="$("$binary" --version)"
          [[ "$version" == fastctx\ * ]]
          responses="$(
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"glibc-smoke","version":"1.0"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' |
              timeout 15s "$binary" serve
          )"
          grep -Eq '"id"[[:space:]]*:[[:space:]]*1' <<<"$responses"
          grep -Eq '"id"[[:space:]]*:[[:space:]]*2' <<<"$responses"
          grep -Eq '"name"[[:space:]]*:[[:space:]]*"read"' <<<"$responses"
          grep -Eq '"name"[[:space:]]*:[[:space:]]*"replace"' <<<"$responses"
          SCRIPT
          chmod +x target/glibc-smoke.sh
          binary="$PWD/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          probe="$PWD/target/glibc-smoke.sh"
          for image in ubuntu:20.04 ubuntu:22.04; do
            docker run --rm \
              --volume "$binary:/opt/fastctx:ro" \
              --volume "$probe:/opt/glibc-smoke:ro" \
              "$image" \
              /bin/bash /opt/glibc-smoke
          done

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Pack and verify npm artifact
        shell: pwsh
        run: |
          $version = (Select-String -LiteralPath Cargo.toml -Pattern '^version = "([^"]+)"$').Matches[0].Groups[1].Value
          $package = switch ("${{ matrix.target }}") {
            "x86_64-pc-windows-msvc" { "fastctx-win32-x64-$version.tgz" }
            "x86_64-unknown-linux-gnu" { "fastctx-linux-x64-$version.tgz" }
            "x86_64-apple-darwin" { "fastctx-darwin-x64-$version.tgz" }
            "aarch64-apple-darwin" { "fastctx-darwin-arm64-$version.tgz" }
          }
          $verificationDirectory = "target/npm-release-verification"
          ./scripts/stage-npm-package.ps1 `
            -Target "${{ matrix.target }}" `
            -Binary "target/${{ matrix.target }}/release/${{ matrix.binary }}" `
            -OutputDirectory $verificationDirectory `
            -IncludeRootPackages
          ./scripts/verify-npm-install.ps1 `
            -PlatformTarball "$verificationDirectory/$package" `
            -MainTarball "$verificationDirectory/fastctx-$version.tgz" `
            -AliasTarball "$verificationDirectory/codex-fastctx-$version.tgz"
          New-Item -ItemType Directory -Force -Path "dist/npm" | Out-Null
          Copy-Item -LiteralPath "$verificationDirectory/$package" -Destination "dist/npm/$package"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.target }}
          path: |
            dist/release/${{ matrix.archive }}
            dist/npm/*.tgz
          if-no-files-found: error

  publish-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Pack npm launcher and compatibility alias
        shell: pwsh
        run: ./scripts/pack-npm-root.ps1 -OutputDirectory "dist/npm"
      - name: Finalize and verify release artifacts
        shell: pwsh
        run: |
          ./scripts/verify-distribution-contract.ps1
          ./scripts/finalize-release-assets.ps1
          ./scripts/verify-release-assets.ps1
      - name: Retain npm packages for manual publishing
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs-${{ github.ref_name }}
          path: dist/npm/*.tgz
          if-no-files-found: error
          retention-days: 90
      - name: Verify annotated release identity
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: ./scripts/verify-release-identity.ps1 -TagName $env:GITHUB_REF_NAME
      - name: Create exact GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="$RUNNER_TEMP/fastctx-release-notes.md"
          cat > "$notes" <<'EOF'
          Initial release.

          - Context-efficient repository tools for coding agents
          - Persistent background Bash jobs
          - Safe Codex integration with a multilingual control TUI
          EOF
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release delete "${GITHUB_REF_NAME}" --yes
          fi
          gh release create "${GITHUB_REF_NAME}" dist/release/* \
            --verify-tag \
            --title "FastCtx ${GITHUB_REF_NAME}" \
            --notes-file "$notes"
      - name: Confirm dry-run boundary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Release artifacts were built and verified without creating or replacing a GitHub Release."
